<div class="p-4 mx-auto lg:max-w-7xl">
      <div class="border-b border-gray-300 pb-4">
        <h2 class="text-slate-900 text-2xl font-bold">Hot list</h2>
        <p class="text-slate-600 mt-2">Out the most popular and trending products.</p>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6 mt-8">

        <!-- single product -->
    @for(product of products(); track $index){
        <app-product-card [product]="product"></app-product-card>
    }
    <!-- single product end -->

      </div>
    </div>
