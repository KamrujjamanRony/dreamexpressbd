<div
  class="flex flex-col border border-gray-300 shadow-sm rounded-md p-1.5 transition-all relative overflow-hidden"
>
  <a [routerLink]="getViewLink(product.id)" class="block">
    <div class="w-full bg-slate-50 dark:bg-slate-800">
      <span class="absolute top-3 left-3 bg-red-500 text-gray-50 text-xs font-bold px-2 py-1 rounded-md">{{ product?.discount }}%</span>
      <img
        [src]="product?.image"
        [alt]="product?.name"
        class="w-full aspect-square object-cover object-top"
      />
    </div>
    <div class="py-4 px-2 text-left">
      <h6
        class="text-sm sm:text-[15px] font-semibold line-clamp-2"
      >
        {{ product?.name }}
      </h6>
      <div class="mt-4">
        <p
          class="font-semibold text-sm sm:text-[15px] wrap-break-word"
        >
          <span class="mr-1.5">MRP:</span
          ><span [innerHTML]="product?.regularPrice | bdt" class="mr-1.5 text-slate-600 dark:text-slate-300 line-through"
            ></span
          > <span [innerHTML]="product?.offerPrice | bdt"></span>
        </p>
      </div>
    </div>
  </a>
  <div class="h-19.5">
    <div
      class="flex flex-col items-center w-full absolute left-0 right-0 px-2 bottom-3"
    >
      <button
        type="button"
        (click)="addToCart(product)"
        class="flex items-center justify-center gap-2 px-2 py-2 cursor-pointer rounded-md text-white text-sm sm:text-[15px] font-medium whitespace-nowrap border-0 outline-0 w-full bg-purple-700 hover:bg-purple-800"
      >
        Add to Bag
      </button>
      <button
        type="button"
        (click)="addToWishlist(product)"
        class="pb-0.5 pt-3 cursor-pointer text-sm sm:text-[15px] text-slate-900 dark:text-slate-50 font-medium whitespace-nowrap outline-0 flex items-center gap-2"
      ><fa-icon [icon]="faHeart"></fa-icon>
        <span>Add to wishlist</span>
      </button>
    </div>
  </div>
</div>
